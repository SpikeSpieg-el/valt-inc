<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>E2EE Messenger</title>
    <script src="https://cdn.jsdelivr.net/npm/tweetnacl@1.0.3/nacl.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/tweetnacl-util@0.15.1/nacl-util.min.js"></script>
    <link href="https://cdn.jsdelivr.net/npm/@fortawesome/fontawesome-free@6.0.0/css/all.min.css" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>

<!-- Login Form -->
<div id="loginForm" class="auth-container">
    <h2><i class="fas fa-lock"></i> Вход</h2>
    <div class="input-group"><input type="text" id="loginUsername" placeholder="Логин"></div>
    <div class="input-group"><input type="password" id="loginPassword" placeholder="Пароль"></div>
    <button onclick="performLogin()">Войти</button>
    <div class="auth-switch">Нет аккаунта? <a href="#" onclick="showRegisterForm()">Создать</a></div>
</div>

<!-- Registration Form -->
<div id="registerForm" class="auth-container hidden">
    <h2><i class="fas fa-user-plus"></i> Регистрация</h2>
    <div class="input-group"><input type="text" id="regUsername" placeholder="Логин"></div>
    <div class="input-group"><input type="password" id="regPassword" placeholder="Пароль"></div>
    <button onclick="register()">Зарегистрироваться</button>
    <div class="auth-switch">Уже есть аккаунт? <a href="#" onclick="showLoginForm()">Войти</a></div>
</div>

<!-- Profile Setup Form (after registration) -->
<div id="profileSetupForm" class="auth-container hidden">
    <h2><i class="fas fa-user-edit"></i> Настройка профиля</h2>
    <div class="input-group"><input type="text" id="setupNickname" placeholder="Ваш ник (как вас видят другие)"></div>
    <div class="input-group">
        <label style="font-size: 13px; color: gray; margin-bottom: 4px; display:block;">Аватар (опционально)</label>
        <input type="file" id="setupAvatarFile" accept="image/*" onchange="processSetupAvatar(event)">
    </div>
    <button onclick="completeProfileSetup()">Сохранить и войти</button>
</div>

<!-- Main Chat App -->
<div id="chatInterface" class="app-container hidden">
    
    <!-- Sidebar -->
    <div id="sidebar" class="sidebar">
        <div class="sidebar-header">
            <div class="profile-info">
                <img id="myAvatarDisplay" class="profile-avatar" src="" style="display:none;" alt="Me">
                <div id="myAvatarText" class="profile-avatar">U</div>
                <div class="profile-details">
                    <h3 id="displayUser">Username</h3>
                    <p onclick="copyKey()" title="Нажмите, чтобы скопировать ключ">
                        <i class="fas fa-key"></i> <span id="myUniqueKeyPreview">Ключ</span>
                    </p>
                </div>
            </div>
            <button class="theme-toggle" onclick="toggleTheme()" title="Переключить тему">
                <i class="fas fa-moon" id="themeIcon"></i>
            </button>
            <div class="search-bar">
                <input type="text" id="searchKey" placeholder="Введите ключ">
                <button onclick="searchUser()" style="width: auto; padding: 0 16px;"><i class="fas fa-search"></i></button>
            </div>
            <div id="searchResult" class="search-result hidden"></div>
        </div>
        
        <div class="contacts-list" id="contactsList"></div>
    </div>

    <!-- Chat Area -->
    <div class="chat-area">
        <div id="emptyChatState" class="empty-state">
            <i class="fas fa-comments"></i>
            <h3>Выберите чат</h3>
            <p>Выберите контакт слева, чтобы начать общение</p>
        </div>

        <div id="activeChatArea" class="hidden" style="display: flex; flex-direction: column; height: 100%;">
            <div class="chat-header">
                <button class="back-btn" onclick="showSidebar()"><i class="fas fa-arrow-left"></i></button>
                <img src="" id="chatHeaderAvatar" class="contact-avatar" alt="Avatar">
                <h3 id="currentChatUser">Contact Name</h3>
            </div>
            <div class="messages-container" id="messages"></div>
            <div class="input-area">
                <input type="text" id="msgText" placeholder="Написать сообщение..." onkeypress="if(event.key === 'Enter') sendMessage()">
                <button class="send-btn" onclick="sendMessage()"><i class="fas fa-paper-plane"></i></button>
            </div>
        </div>
    </div>
</div>

<!-- Custom Alert Modal -->
<div id="customAlert" class="custom-alert hidden">
    <div class="alert-content">
        <div class="alert-icon"><i class="fas fa-info-circle"></i></div>
        <div class="alert-message" id="alertMessage"></div>
        <button class="alert-btn" onclick="closeCustomAlert()">OK</button>
    </div>
</div>

<script src="script.js"></script>
</body>
</html>
