# This is the default configuration for local development
# For production, use: docker-compose -f docker-compose.prod.yml up -d
# For development, use: docker-compose -f docker-compose.dev.yml up -d
# Or simply: docker-compose up -d (uses this file)

version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    container_name: valt-postgres
    environment:
      POSTGRES_USER: valtuser
      POSTGRES_PASSWORD: valtpass
      POSTGRES_DB: messenger
    ports:
      - "5433:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ./init.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U valtuser -d messenger"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: valt-redis
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: valt-app
    ports:
      - "3005:8080"
    environment:
      - REDIS_ADDR=redis:6379
      - DB_HOST=postgres
      - DB_PORT=5432
      - DB_USER=valtuser
      - DB_PASSWORD=valtpass
      - DB_NAME=messenger
      - DB_SSLMODE=disable
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

volumes:
  postgres-data:
